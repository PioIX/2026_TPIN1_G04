<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026_TPIN1_G04</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Arimo:ital,wght@0,400..700;1,400..700&family=Chau+Philomene+One:ital@0;1&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Patrick+Hand&family=Pixelify+Sans:wght@400..700&family=Rock+Salt&family=Spectral+SC:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;1,200;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="paginaPrincipal">
        <h1>Pasapalabra</h1>
        <button onclick="ui.mostrarLogin()">PLAY</button>
    </div>

    <div id="barraSuperior">
        <a href="#" onclick="ui.mostrarInicio()"><img src="Imagenes/Logo.png" alt="LOGO"></a>
        <div id="hrefs" style="display: none;">
            <a href="#" onclick="ui.mostrarLogin()">Iniciar Sesión</a>
            <a href="#" onclick="ui.mostrarRegistro()">Registrarse</a>
        </div>
    </div>

    <div id="seccionRegistro" style="display: none;">
        <h1>Registro</h1>
        <div class="registro">
            <p>Ingrese su nombre de usuario</p>
            <input type="text" id="usuarioRegistro" placeholder="Nombre de usuario">
            <p>Ingrese su correo electrónico</p>
            <input type="text" id="correoRegistro" placeholder="Correo electrónico">
            <p>Ingrese la contraseña</p>
            <input type="password" id="passwordRegistro" placeholder="Contraseña">

        </div>
        <button onclick="newUser()">NEXT</button>
    </div>

    <div id="seccionInicioSesion" style="display: none;">
        <h1>Inicio de Sesión</h1>

        <div class="login">
            <p>Ingrese su nombre de usuario</p>
            <input type="text" id="usuarioLogin">
            <p>Ingrese su contraseña</p>
            <input type="password" id="passwordLogin">
        </div>

        <button onclick="login()">NEXT</button>
    </div>

    <div id="seccionJuego" style="display: none;">
        <div id="letras">

        </div>
        <div id="pregunta">

        </div>
        <input type="text" placeholder="Tu respuesta aquí">
        <button id="botonPasapalabra">PASAPALABRA</button>
        <button id="botonEnviar">ENVIAR</button>
    </div>
    
    <div id="seccionAdmin" style="display: none;">

        <div>
            <h2>Usuarios</h2>
            <button>Traer usuarios</button>
            <button>Agregar Usuario</button>
            <button>Eliminar Usuario</button>
            <button>Modificar Usuario</button>
        </div>

        <div>
            <h2>Preguntas</h2>
            <button>Traer preguntas</button>
            <button>Agregar pregunta</button>
            <button>Eliminar pregunta</button>
            <button>Modificar pregunta</button>
        </div>
    </div>

    <script src="dom.js"></script>
    <script src="index.js"></script>
    <script src="logic.js"></script>

</body>
</html>
