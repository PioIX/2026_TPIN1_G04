<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026_TPIN1_G04</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


<header></header>

<div class="inicio">
    <h1>Pasapalabra</h1>
    <button>PLAY</button>
</div>

<nav>
    <div>
        <img src="" alt="LOGO">
        <div>
            <a href="">Iniciar Sesión</a>
            <a href="">Registrarse</a>
        </div>
    </div>
</nav>

<!-- Pantalla de registro -->
<div class="registro">
    <h1>Registro</h1>
    <p>Ingrese su nombre de usuario</p>
    <input type="text" id="usuarioRegistro" placeholder="Nombre de usuario">

    <p>Ingrese su correo electrónico</p>
    <input type="text" id="correoRegistro" placeholder="Correo electrónico">

    <p>Ingrese la contraseña</p>
    <input type="text" id="contraseñaRegistro" placeholder="Contraseña">

    <button onclick="newUser()">NEXT</button>
</div>

<!-- Pantalla de Inicio de sesión -->
<div class="login">
    <h1>Inicio de Sesión</h1>

    <p>Ingrese su nombre de usuario</p>
    <input type="text" id="usuarioLogin">

    <p>Ingrese su contraseña</p>
    <input type="text" id="contraseñaLogin">

    <button onclick="login()">NEXT</button>
</div>

<div id="letras"></div>

<div id="pregunta"></div>

<input type="text">

<button>PASAPALABRA</button>
<button>ENVIAR</button>

<div>
    <img src="" alt="LOGO">
</div>

<div>
    <h2>Usuarios</h2>
    <button>Traer usuarios</button>
    <button>Agregar Usuario</button>
    <button>Eliminar Usuario</button>
    <button>Modificar Usuario</button>
</div>

<div>
    <h2>Preguntas</h2>
    <button>Traer preguntas</button>
    <button>Agregar pregunta</button>
    <button>Eliminar pregunta</button>
    <button>Modificar pregunta</button>
</div>

<script type="module" src="index.js"></script>
<script type="module" src="logic.js"></script>
<script src="dom.js"></script>


</body>

</html>
